<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT Plus 会员专区</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont;
    background:#f6f6f6;
    margin:0;
    padding:20px;
}

.container{
    max-width:480px;
    margin:auto;
}

.card{
    background:#fff;
    border-radius:16px;
    padding:18px;
    margin-bottom:14px;
    box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

h1{
    font-size:22px;
    margin:0 0 8px;
}

.desc{
    font-size:14px;
    color:#666;
}

.btn{
    padding:14px;
    border-radius:12px;
    text-align:center;
    margin-top:10px;
    cursor:pointer;
    font-size:15px;
}

.main{
    background:#111;
    color:#fff;
}

.light{
    background:#eee;
}

.warn{
    color:#e33;
    font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>GPT Plus 会员专区</h1>
<div class="desc">直充 / 成品号 / 续费均可处理</div>
</div>

<div class="card">

<p>付款后请先保存订单号和付款截图</p>

<p>1️⃣ 付款后请保存【订单号 + 付款截图】</p>

<p>2️⃣ 优先联系【在线客服】为您直接办理（回复更快）</p>

<p class="warn">
⚠️ 如在线客服未及时回复：<br>
请添加微信：MEL_125 进行处理
</p>

<p>📌 建议优先使用在线客服（响应更快）</p>
<p>📌 如长期购买，建议添加微信方便后续沟通</p>

</div>

<div class="card">

<div class="btn light" onclick="alert('请先完成付款并保存订单号和截图')">
保存订单号和截图
</div>

<div class="btn main" onclick="openChat()">
优先联系在线客服办理
</div>

<div class="btn light" onclick="copyWX()">
未回复再加微信：MEL_125
</div>

</div>

<div class="card">
<div class="btn main" onclick="showPay()">
确认订单并查看支付码
</div>
</div>

</div>

<script>

// 👉 这里我帮你做了：点击就是跳聊天（你只要换链接就行）
function openChat(){
    window.open('https://tawk.to/chat/你的ID/1你的ID','_blank');
}

// 👉 自动复制微信
function copyWX(){
    navigator.clipboard.writeText('MEL_125');
    alert('微信号已复制：MEL_125');
}

// 👉 支付提示
function showPay(){
    alert('付款后请先保存订单号和截图，再联系在线客服处理');
}

</script>

</body>
</html>
